<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="./sample.html" method="get">
      <fieldset>
        <legend>User Details</legend>
        <label for="fn">First Name :</label>
        <input type="text" id="fn" />
        <br /><br />
        <label for="ln">Last Name :</label>
        <input type="text" id="ln" />
        <br /><br />
        <label for="mail">Email :</label>
        <input type="email" id="mail" />
        <br /><br />
        <label for="">Password :</label>
        <input type="password" />
        <br /><br />
        <label for="">Age :</label>
        <input type="number" id="" />
        <br /><br />
        <label for="">Skills Known :</label>
        <br />
        <label for="">HTML</label>
        <input type="checkbox" />
        <label for="">CSS</label>
        <input type="checkbox" />
        <label for="">JS</label>
        <input type="checkbox" />
        <label for="">Java</label>
        <input type="checkbox" />
        <label for="">Python</label>
        <input type="checkbox" />
        <br /><br />
        <label for="">Eligible To Vote</label>
        <br />
        <label for="">Yes</label>
        <input type="radio" name="vote" />
        <label for="">No</label>
        <input type="radio" name="vote" />
        <br /><br />
        <label for="">Countries Visited</label>
        <select name="" id="">
          <option value=""></option>
          <option value="">Korea</option>
          <option value="">Australia</option>
          <option value="">Bangkok</option>
          <option value="">Paris</option>
          <option value="">Switzerland</option>
          <option value="">Spain</option>
        </select>
        <br /><br />
        <label for="">Choose Your Vehicle</label>
        <select name="" id="">
          <option value=""></option>
          <optgroup label="Bike">
            <option value="">Royal Enfield</option>
            <option value="">Pulsar 200</option>
            <option value="">Hero Honda</option>
          </optgroup>
          <optgroup label="Cars">
            <option value="">Mustang</option>
            <option value="">Dodge</option>
            <option value="">BMW</option>
          </optgroup>
        </select>
        <br /><br />
        <input type="submit" />
        <input type="reset" />
      </fieldset>
    </form>
  </body>
</html>
