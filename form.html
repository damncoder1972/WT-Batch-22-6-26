<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="./sample.html" method="post">
      <fieldset>
        <legend title="Title For The Form">User Details</legend>
        <label for="fn">First Name :</label>
        <input type="text" id="fn" value="Ravindra" name="FName" disabled />
        <br /><br />
        <label for="ln" title="Last Name">Last Name :</label>
        <input type="text" id="ln" name="LName" value="Jadeja" readonly />
        <br /><br />
        <label for="mail">Email :</label>
        <input type="email" id="mail" name="email" required multiple />
        <br /><br />
        <label for="">Password :</label>
        <input
          type="password"
          name="pw"
          required
          minlength="8"
          maxlength="16"
          pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!&*_@#]).{8,16}"
        />
        <br /><br />
        <label for="">Mobile No :</label>
        <input
          type="tel"
          name="Mob_No"
          placeholder="Enter Mobile Number"
          title="Mobile Number"
        />
        <br /><br />
        <label for="">Age :</label>
        <input type="number" id="" min="18" max="25" autofocus />
        <br /><br />
        <label for="">Select Your DOB :</label>
        <input type="date" min="2000-01-01" max="2005-12-31" />
        <br /><br />
        <label for="">Check In Time : </label>
        <input type="time" min="09:00" max="09:10" disabled />
        <br /><br />
        <input type="datetime-local" />
        <br /><br />
        <input type="month" />
        <input type="week" />
        <br /><br />
        <label for="">Skills Known :</label>
        <br />
        <label for="">HTML</label>
        <input type="checkbox" name="html" checked />
        <label for="">CSS</label>
        <input type="checkbox" name="css" checked />
        <label for="">JS</label>
        <input type="checkbox" name="js" />
        <label for="">Java</label>
        <input type="checkbox" name="java" />
        <label for="">Python</label>
        <input type="checkbox" name="py" />
        <br /><br />
        <label for="">Eligible To Vote</label>
        <br />
        <label for="">Yes</label>
        <input type="radio" name="vote" />
        <label for="">No</label>
        <input type="radio" name="vote" checked />
        <br /><br />
        <label for="">Countries Visited</label>
        <select name="" id="" title="Select Country">
          <option value=""></option>
          <option value="kor" name="City">Korea</option>
          <option value="aus" name="City" selected>Australia</option>
          <option value="ban" name="City">Bangkok</option>
          <option value="Paris" name="City">Paris</option>
          <option value="swi" name="City">Switzerland</option>
          <option value="spa" name="City">Spain</option>
        </select>
        <br /><br />
        <label for="">Choose Your Vehicle</label>
        <select name="" id="" multiple>
          <option value=""></option>
          <optgroup label="Bike">
            <option value="">Royal Enfield</option>
            <option value="">Pulsar 200</option>
            <option value="">Hero Honda</option>
          </optgroup>
          <optgroup label="Cars">
            <option value="">Mustang</option>
            <option value="">Dodge</option>
            <option value="">BMW</option>
          </optgroup>
        </select>
        <br /><br />
        <label for="">Set Your Experience</label>
        <input type="range" min="0" max="100" step="20" />
        <br /><br />
        <label for="">Upload The Document </label>
        <br />
        <input type="file" accept=".png,.pdf" />
        <br /><br />
        <label for="">Choose your Favourite Color </label>
        <br />
        <input type="color" />
        <br /><br />
        <label for="">Portfolio URL :</label>
        <input type="url" />
        <br /><br />
        <label for="">Search Your Degree :</label>
        <input type="search" />
        <br /><br />
        <input type="hidden" value="html" />
        <br /><br />
        <label for="">Self Introduction About Yourself :</label>
        <br />
        <textarea name="" id=""></textarea>
        <br /><br />
        <input type="submit" />
        <input type="reset" />
      </fieldset>
    </form>
  </body>
</html>
